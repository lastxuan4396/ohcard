services:
  - type: web
    name: repair-12min
    runtime: static
    plan: free
    branch: codex/repair-12min
    autoDeploy: true
    buildCommand: "echo 'No build step for static HTML'"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
